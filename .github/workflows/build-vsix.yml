name: Build VSIX

on:
  push:
    branches:
      - master
    tags:
      - "v*"
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "esbuild.js"
      - "eslint.config.mjs"
      - "resources/**"
      - ".github/workflows/build-vsix.yml"
      - ".github/plugins/**"
      - ".github/plugin/**"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "esbuild.js"
      - "eslint.config.mjs"
      - "resources/**"
      - ".github/workflows/build-vsix.yml"
      - ".github/plugins/**"
      - ".github/plugin/**"
  workflow_dispatch:

jobs:
  build-package:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:all

      - name: Package extension
        run: npx --yes @vscode/vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-vsix
          path: "*.vsix"
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-review-vsix

      - name: Publish to VS Code Marketplace
        run: npx --yes @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
